version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: narrative-engine-db
    environment:
      POSTGRES_USER: narrative_engine
      POSTGRES_PASSWORD: narrative_engine
      POSTGRES_DB: narrative_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U narrative_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
